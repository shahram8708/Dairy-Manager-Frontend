<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="error-page">
    <div class="error-wrapper">
        <div class="error-content">
            <div class="error-icon error-icon-404">
                <i class="bi bi-droplet-fill"></i>
                <span class="error-code">404</span>
            </div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">
                Oops! The page you're looking for seems to have been spilled.
                <br>Let's get you back on track.
            </p>
            <div class="error-actions">
                <a href="/dashboard" class="btn btn-primary btn-lg">
                    <i class="bi bi-house-fill me-2"></i>Go to Dashboard
                </a>
                <a href="/login" class="btn btn-outline-secondary btn-lg ms-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Login
                </a>
            </div>
        </div>
    </div>
</body>
</html>
