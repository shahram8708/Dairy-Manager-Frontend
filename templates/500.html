<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body class="error-page">
    <div class="error-wrapper">
        <div class="error-content">
            <div class="error-icon error-icon-500">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span class="error-code">500</span>
            </div>
            <h1 class="error-title">Server Error</h1>
            <p class="error-message">
                Something went wrong on our end.
                <br>Our team has been notified and is working on a fix.
            </p>
            <div class="error-actions">
                <a href="/dashboard" class="btn btn-primary btn-lg">
                    <i class="bi bi-house-fill me-2"></i>Go to Dashboard
                </a>
                <button class="btn btn-outline-secondary btn-lg ms-2" onclick="location.reload()">
                    <i class="bi bi-arrow-clockwise me-2"></i>Retry
                </button>
            </div>
        </div>
    </div>
</body>
</html>
