{% extends 'base.html' %}
{% block title %}Daily Delivery Entry{% endblock %}
{% block content %}
<div class="delivery-page-shell">
    <div class="delivery-toolbar mb-3">
        <div class="d-flex justify-content-between align-items-center gap-2 mb-3">
            <h4 class="page-title mb-0"><i class="bi bi-grid-3x3 me-2"></i>Daily Delivery Entry</h4>
            <span id="entryStatus" class="badge bg-secondary">No entry loaded</span>
        </div>
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <div class="row g-2 align-items-end delivery-filter-row">
                    <div class="col-12 col-md-3"><label class="form-label">Agency <span class="text-danger">*</span></label><select class="form-select" id="agencySelect"><option value="">Select Agency</option></select></div>
                    <div class="col-12 col-md-3"><label class="form-label">Date <span class="text-danger">*</span></label><input type="date" class="form-control" id="deliveryDate"></div>
                    <div class="col-12 col-md-2"><button class="btn btn-primary w-100" onclick="loadGrid()"><i class="bi bi-search me-1"></i>Load</button></div>
                    <div class="col-12 col-md-4 text-md-end" id="actionButtons" style="display:none">
                        <button class="btn btn-success me-1 action-btn" id="saveBtn" onclick="saveEntry()"><i class="bi bi-check-lg me-1"></i>Save</button>
                        <button class="btn btn-warning me-1 action-btn" id="finalizeBtn" onclick="finalizeEntry()"><i class="bi bi-lock me-1"></i>Finalize</button>
                        <button class="btn btn-outline-warning action-btn" id="unlockBtn" onclick="unlockEntry()" style="display:none"><i class="bi bi-unlock me-1"></i>Unlock</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="delivery-swipe-hint d-md-none" id="swipeHint" style="display:none">← Swipe to view more dealers →</div>
    </div>
    <div class="card shadow-sm" id="gridCard" style="display:none">
        <div class="card-body p-0">
            <div class="delivery-grid-wrapper delivery-entry-grid-wrapper">
                <div class="delivery-responsive-area" id="deliveryResponsiveArea">
                    <table class="table table-bordered table-sm mb-0 delivery-grid d-none d-sm-table" id="deliveryGrid">
                        <thead id="gridHead"></thead>
                        <tbody id="gridBody"></tbody>
                        <tfoot id="gridFoot"></tfoot>
                    </table>
                    <div class="delivery-mobile-cards d-block d-sm-none" id="deliveryMobileCards"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="mobile-action-bar d-md-none" id="mobileActionBar" style="display:none">
    <button class="btn btn-success flex-fill action-btn" id="mobileSaveBtn" onclick="saveEntry()"><i class="bi bi-check-lg me-1"></i>Save</button>
    <button class="btn btn-warning flex-fill action-btn" id="mobileFinalizeBtn" onclick="finalizeEntry()"><i class="bi bi-lock me-1"></i>Finalize</button>
    <button class="btn btn-outline-warning flex-fill action-btn" id="mobileUnlockBtn" onclick="unlockEntry()" style="display:none"><i class="bi bi-unlock me-1"></i>Unlock</button>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/delivery_entry.js"></script>
{% endblock %}
