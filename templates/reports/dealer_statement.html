{% extends 'base.html' %}
{% block title %}Dealer Statement Report{% endblock %}
{% block content %}
<h4 class="page-title mb-4"><i class="bi bi-file-text me-2"></i>Dealer Statement Report</h4>
<div class="card shadow-sm mb-3"><div class="card-body">
    <div class="row g-2 align-items-end">
        <div class="col-md-3"><label class="form-label">Dealer</label>
            <input type="text" class="form-control" id="dealerSearch" placeholder="Search dealer..." oninput="searchDealers()">
            <div id="dealerDropdown" class="list-group position-absolute shadow" style="z-index:1000;max-height:200px;overflow-y:auto;display:none"></div>
            <input type="hidden" id="selectedDealerId">
        </div>
        <div class="col-md-2"><label class="form-label">From</label><input type="date" class="form-control" id="fromDate"></div>
        <div class="col-md-2"><label class="form-label">To</label><input type="date" class="form-control" id="toDate"></div>
        <div class="col-md-2"><button class="btn btn-primary" onclick="generateReport()"><i class="bi bi-search me-1"></i>Generate</button></div>
        <div class="col-md-3 text-end" id="exportBtns" style="display:none">
            <button class="btn btn-outline-danger btn-sm me-1" onclick="exportReport('pdf')"><i class="bi bi-file-pdf"></i> PDF</button>
            <button class="btn btn-outline-success btn-sm me-1" onclick="exportReport('excel')"><i class="bi bi-file-excel"></i> Excel</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        </div>
    </div>
</div></div>
<div id="reportContent" style="display:none">
    <div id="dealerInfo" class="card shadow-sm mb-3"><div class="card-body" id="dealerInfoBody"></div></div>
    <div class="row g-3 mb-3" id="summaryCards"></div>
    <div class="card shadow-sm"><div class="card-body p-0">
        <div class="table-responsive"><table class="table table-sm table-hover mb-0">
            <thead><tr><th>Date</th><th>Description</th><th class="text-end">Debit (₹)</th><th class="text-end">Credit (₹)</th><th class="text-end">Balance (₹)</th></tr></thead>
            <tbody id="statementBody"></tbody>
        </table></div>
    </div></div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/reports.js"></script>
<script>
const searchDealers = App.debounce(async () => {
    const q = document.getElementById('dealerSearch').value.trim();
    const dd = document.getElementById('dealerDropdown');
    if (q.length < 1) { dd.style.display = 'none'; return; }
    try {
        const data = await API.get(`/dealers?search=${encodeURIComponent(q)}&per_page=8&is_active=true`);
        dd.innerHTML = (data.dealers || []).map(d => `<a href="#" class="list-group-item list-group-item-action" onclick="pickDealer(${d.id}, '${d.name}'); return false;">${d.name} <small class="text-muted">(${d.agency_name})</small></a>`).join('');
        dd.style.display = data.dealers.length ? 'block' : 'none';
    } catch(e) { dd.style.display = 'none'; }
}, 300);
function pickDealer(id, name) {
    document.getElementById('selectedDealerId').value = id;
    document.getElementById('dealerSearch').value = name;
    document.getElementById('dealerDropdown').style.display = 'none';
}
async function generateReport() {
    const dealerId = document.getElementById('selectedDealerId').value;
    if (!dealerId) { App.showToast('Select a dealer', 'error'); return; }
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    App.showLoading();
    try {
        let url = `/reports/dealer-statement?dealer_id=${dealerId}`;
        if (from) url += `&from_date=${from}`; if (to) url += `&to_date=${to}`;
        const data = await API.get(url);
        const d = data.dealer || {};
        const s = data.summary || {};
        document.getElementById('dealerInfoBody').innerHTML = `<h5>${d.name}</h5><p class="mb-0 text-muted">${d.agency_name || ''} ${d.phone ? '• ' + d.phone : ''} ${d.address ? '• ' + d.address : ''}</p>`;
        document.getElementById('summaryCards').innerHTML = `
            <div class="col-md-3"><div class="card bg-light"><div class="card-body py-2 text-center"><small>Opening</small><div class="fw-bold">${App.formatCurrency(s.opening_balance)}</div></div></div></div>
            <div class="col-md-3"><div class="card bg-light"><div class="card-body py-2 text-center"><small>Total Billed</small><div class="fw-bold text-danger">${App.formatCurrency(s.total_billed)}</div></div></div></div>
            <div class="col-md-3"><div class="card bg-light"><div class="card-body py-2 text-center"><small>Total Paid</small><div class="fw-bold text-success">${App.formatCurrency(s.total_paid)}</div></div></div></div>
            <div class="col-md-3"><div class="card bg-light"><div class="card-body py-2 text-center"><small>Closing</small><div class="fw-bold">${App.formatCurrency(s.closing_balance)}</div></div></div></div>`;
        document.getElementById('statementBody').innerHTML = (data.statement || []).map(e => `<tr class="${e.type === 'payment' ? 'table-success' : ''}">
            <td>${e.date}</td><td>${e.description}</td>
            <td class="text-end">${e.debit ? App.formatCurrency(e.debit) : '-'}</td>
            <td class="text-end">${e.credit ? App.formatCurrency(e.credit) : '-'}</td>
            <td class="text-end fw-bold">${App.formatCurrency(e.balance)}</td></tr>`).join('') || '<tr><td colspan="5" class="text-center text-muted">No entries</td></tr>';
        document.getElementById('reportContent').style.display = 'block';
        document.getElementById('exportBtns').style.display = 'block';
    } catch(e) { App.showToast(e.error || 'Failed', 'error'); }
    App.hideLoading();
}
function exportReport(format) {
    const dealerId = document.getElementById('selectedDealerId').value;
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    let url = `/reports/export/dealer-statement?format=${format}&dealer_id=${dealerId}`;
    if (from) url += `&from_date=${from}`; if (to) url += `&to_date=${to}`;
    API.download(url, `statement_${dealerId}.${format === 'pdf' ? 'pdf' : 'xlsx'}`);
}
document.addEventListener('DOMContentLoaded', () => {
    const today = App.todayISO();
    const monthAgo = new Date(); monthAgo.setMonth(monthAgo.getMonth() - 1);
    document.getElementById('fromDate').value = monthAgo.toISOString().split('T')[0];
    document.getElementById('toDate').value = today;
});
</script>
{% endblock %}
