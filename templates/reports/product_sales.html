{% extends 'base.html' %}
{% block title %}Product Sales Report{% endblock %}
{% block content %}
<h4 class="page-title mb-4"><i class="bi bi-bar-chart me-2"></i>Product Sales Report</h4>
<div class="card shadow-sm mb-3"><div class="card-body">
    <div class="row g-2 align-items-end">
        <div class="col-md-3"><label class="form-label">From Date</label><input type="date" class="form-control" id="fromDate"></div>
        <div class="col-md-3"><label class="form-label">To Date</label><input type="date" class="form-control" id="toDate"></div>
        <div class="col-md-2"><button class="btn btn-primary" onclick="generateReport()"><i class="bi bi-search me-1"></i>Generate</button></div>
        <div class="col-md-4 text-end" id="exportBtns" style="display:none">
            <button class="btn btn-outline-danger btn-sm me-1" onclick="exportReport('pdf')"><i class="bi bi-file-pdf"></i> PDF</button>
            <button class="btn btn-outline-success btn-sm me-1" onclick="exportReport('excel')"><i class="bi bi-file-excel"></i> Excel</button>
            <button class="btn btn-outline-secondary btn-sm" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        </div>
    </div>
</div></div>
<div id="reportContent" style="display:none">
    <div class="row g-3 mb-3" id="periodInfo"></div>
    <div class="card shadow-sm"><div class="card-body p-0">
        <div class="table-responsive"><table class="table table-hover table-sm mb-0">
            <thead><tr><th>Product</th><th>Pack Size</th><th class="text-end">Total Quantity</th><th class="text-end">Total Revenue (₹)</th><th class="text-end">Avg Daily Qty</th></tr></thead>
            <tbody id="reportBody"></tbody>
            <tfoot id="reportFoot"></tfoot>
        </table></div>
    </div></div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/reports.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const today = App.todayISO();
    const monthAgo = new Date(); monthAgo.setMonth(monthAgo.getMonth() - 1);
    document.getElementById('fromDate').value = monthAgo.toISOString().split('T')[0];
    document.getElementById('toDate').value = today;
});
async function generateReport() {
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    if (!from || !to) { App.showToast('Select both dates', 'error'); return; }
    App.showLoading();
    try {
        const data = await API.get(`/reports/product-sales?from_date=${from}&to_date=${to}`);
        const products = data.products || [];
        const period = data.period || {};
        document.getElementById('periodInfo').innerHTML = `
            <div class="col-auto"><div class="card bg-light"><div class="card-body py-2 px-3"><small class="text-muted">Period</small><div class="fw-bold">${period.from || from} to ${period.to || to}</div></div></div></div>
            <div class="col-auto"><div class="card bg-light"><div class="card-body py-2 px-3"><small class="text-muted">Days</small><div class="fw-bold">${period.days || '-'}</div></div></div></div>`;
        let totalQty = 0, totalRev = 0;
        document.getElementById('reportBody').innerHTML = products.length ? products.map(p => {
            totalQty += p.total_quantity || 0; totalRev += p.total_revenue || 0;
            return `<tr><td><strong>${p.name}</strong></td><td>${p.pack_size || '-'}</td>
                <td class="text-end">${(p.total_quantity || 0).toFixed(2)}</td>
                <td class="text-end">${App.formatCurrency(p.total_revenue)}</td>
                <td class="text-end">${(p.avg_daily_quantity || 0).toFixed(2)}</td></tr>`;
        }).join('') : '<tr><td colspan="5" class="text-center text-muted">No sales data</td></tr>';
        document.getElementById('reportFoot').innerHTML = `<tr class="table-dark">
            <td colspan="2" class="fw-bold">TOTAL</td>
            <td class="text-end fw-bold">${totalQty.toFixed(2)}</td>
            <td class="text-end fw-bold">${App.formatCurrency(totalRev)}</td><td></td></tr>`;
        document.getElementById('reportContent').style.display = 'block';
        document.getElementById('exportBtns').style.display = 'block';
    } catch(e) { App.showToast(e.error || 'Failed', 'error'); }
    App.hideLoading();
}
function exportReport(format) {
    const from = document.getElementById('fromDate').value;
    const to = document.getElementById('toDate').value;
    API.download(`/reports/export/product-sales?format=${format}&from_date=${from}&to_date=${to}`, `product_sales.${format === 'pdf' ? 'pdf' : 'xlsx'}`);
}
</script>
{% endblock %}
